version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: forecast-postgres

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: forecasting

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: forecast-minio

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: forecast-mlflow

    ports:
      - "5000:5000"

    command: mlflow ui --host 0.0.0.0

volumes:
  postgres_data:
  minio_data:
